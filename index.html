<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Survey Bot Legal</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background: #1e293b;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      width: 320px;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 24px;
    }

    p {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 20px;
    }

    a {
      display: block;
      margin: 10px 0;
      padding: 10px;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      transition: 0.2s;
    }

    a:hover {
      background: #2563eb;
    }

    .footer {
      margin-top: 15px;
      font-size: 12px;
      color: #64748b;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Survey Bot</h1>
    <p>Legal documents for bot usage</p>

    <a href="terms.html">Terms of Service</a>
    <a href="privacy.html">Privacy Policy</a>

    <div class="footer">
      Powered by GitHub Pages
    </div>
  </div>
</body>
</html>
